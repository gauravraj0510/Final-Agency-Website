<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" width="760" height="280">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E9D5FF"/>
    </linearGradient>
    <radialGradient id="moon" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#A855F7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.1"/>
    </radialGradient>
    <linearGradient id="flameOuter" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#7C3AED" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#6D28D9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flameMid" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#E9D5FF" stop-opacity="0.95"/>
      <stop offset="25%" stop-color="#C084FC" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#A855F7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flameCore" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#E9D5FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0"/>
    </linearGradient>
    <filter id="flameGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#A855F7" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="280" rx="20" fill="#050505"/>

  <!-- Icon — exact copy of icon-only scaled to fit height (0.7x) -->
  <g transform="scale(0.7)">
    <!-- Moon -->
    <circle cx="200" cy="185" r="140" fill="#120E1A"/>
    <circle cx="200" cy="185" r="140" fill="url(#moon)"/>
    <circle cx="200" cy="185" r="140" stroke="#A855F7" stroke-width="1.5" fill="none" opacity="0.25"/>
    <!-- Moon craters -->
    <circle cx="152" cy="140" r="22" fill="#A855F7" opacity="0.07"/>
    <circle cx="152" cy="140" r="22" stroke="#C084FC" stroke-width="0.8" fill="none" opacity="0.1"/>
    <circle cx="248" cy="200" r="16" fill="#A855F7" opacity="0.06"/>
    <circle cx="248" cy="200" r="16" stroke="#C084FC" stroke-width="0.6" fill="none" opacity="0.08"/>
    <circle cx="180" cy="218" r="12" fill="#A855F7" opacity="0.05"/>
    <circle cx="180" cy="218" r="12" stroke="#C084FC" stroke-width="0.5" fill="none" opacity="0.07"/>
    <circle cx="230" cy="148" r="9" fill="#C084FC" opacity="0.06"/>
    <circle cx="230" cy="148" r="9" stroke="#A855F7" stroke-width="0.5" fill="none" opacity="0.08"/>
    <circle cx="200" cy="260" r="14" fill="#A855F7" opacity="0.05"/>
    <circle cx="200" cy="260" r="14" stroke="#C084FC" stroke-width="0.5" fill="none" opacity="0.06"/>
    <circle cx="160" cy="180" r="6" fill="#C084FC" opacity="0.05"/>
    <circle cx="240" cy="240" r="8" fill="#A855F7" opacity="0.04"/>
    <circle cx="175" cy="120" r="5" fill="#C084FC" opacity="0.06"/>

    <!-- A rocket -->
    <path d="M200 62 L320 338 L282 338 L254 268 L146 268 L118 338 L80 338 Z"
          fill="url(#g1)"/>
    <path d="M200 138 L164 244 L236 244 Z" fill="#050505"/>

    <!-- Orbits -->
    <path d="M228 108 C272 108, 306 146, 306 186 C306 226, 272 248, 254 268"
          stroke="url(#g2)" stroke-width="5" fill="none" stroke-linecap="round"
          opacity="0.75" filter="url(#softGlow)"/>
    <path d="M172 108 C128 108, 94 146, 94 186 C94 226, 128 248, 146 268"
          stroke="url(#g2)" stroke-width="5" fill="none" stroke-linecap="round"
          opacity="0.75" filter="url(#softGlow)"/>

    <!-- Orbital dots -->
    <circle cx="306" cy="186" r="7" fill="#C084FC" filter="url(#dotGlow)"/>
    <circle cx="94" cy="186" r="7" fill="#C084FC" filter="url(#dotGlow)"/>

    <!-- Rocket exhaust -->
    <g filter="url(#flameGlow)">
      <path d="M170 338 C178 365, 188 392, 200 400 C212 392, 222 365, 230 338"
            fill="url(#flameOuter)"/>
      <path d="M180 338 C186 360, 194 380, 200 390 C206 380, 214 360, 220 338"
            fill="url(#flameMid)"/>
      <path d="M190 338 C194 354, 198 368, 200 374 C202 368, 206 354, 210 338"
            fill="url(#flameCore)"/>
    </g>
    <!-- Spark particles -->
    <circle cx="188" cy="360" r="1.5" fill="#C084FC" opacity="0.6"/>
    <circle cx="212" cy="355" r="1.2" fill="#E9D5FF" opacity="0.5"/>
    <circle cx="196" cy="372" r="1" fill="#A855F7" opacity="0.4"/>
    <circle cx="206" cy="378" r="0.8" fill="#C084FC" opacity="0.3"/>

    <!-- Stars -->
    <circle cx="52" cy="68" r="1.5" fill="#C084FC" opacity="0.6"/>
    <circle cx="90" cy="130" r="1" fill="#A855F7" opacity="0.3"/>
    <circle cx="72" cy="320" r="1.2" fill="#C084FC" opacity="0.4"/>

    <!-- Sparkle at nose -->
    <circle cx="200" cy="56" r="2.5" fill="#C084FC" opacity="0.6"/>
  </g>

  <!-- Company Name — vertically centered -->
  <text x="260" y="165" font-family="'Figtree','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="142" font-weight="700" letter-spacing="-2" fill="url(#tg)"
        filter="url(#textGlow)">AVELIX</text>

  <!-- Subtitle -->
  <text x="264" y="219" font-family="'Figtree','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="28" font-weight="400" letter-spacing="14" fill="#A855F7" opacity="0.75">PRIVATE LIMITED</text>

  <!-- Accent line -->
  <line x1="264" y1="237" x2="600" y2="237" stroke="url(#g2)" stroke-width="1" opacity="0.2"/>
</svg>